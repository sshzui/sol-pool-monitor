<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>钱包测试</title></head>
<body style="background:#0d1117;color:#e6edf3;font-family:monospace;padding:20px;">
<h2>🔍 Phantom 钱包检测</h2>
<div id="output" style="background:#161b22;border:1px solid #30363d;padding:16px;border-radius:8px;line-height:1.8;"></div>
<button id="btn" style="margin-top:16px;padding:10px 20px;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:16px;">连接钱包</button>
<script>
const out = document.getElementById('output');
function log(msg) { out.innerHTML += msg + '<br>'; }

log('🟡 页面加载完成');
log('📌 window.solana: ' + typeof window.solana);
log('📌 window.solana?.isPhantom: ' + window.solana?.isPhantom);
log('📌 window.phantom: ' + typeof window.phantom);
log('📌 window.phantom?.solana: ' + typeof window.phantom?.solana);
log('📌 window.okxwallet: ' + typeof window.okxwallet);

document.getElementById('btn').onclick = async function() {
  log('🔄 点击连接...');
  const p = window.solana || window.phantom?.solana || window.okxwallet?.solana;
  if (!p) { log('❌ 没有钱包'); return; }
  log('✅ 找到钱包，正在连接...');
  try {
    const r = await p.connect();
    log('✅ 连接成功: ' + (r.publicKey?.toString() || p.publicKey?.toString()));
  } catch(e) {
    log('❌ 错误: ' + e.message);
  }
};
</script>
</body>
</html>

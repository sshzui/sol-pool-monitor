<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana Token-2022 Creator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 8px;
      color: #58a6ff;
    }
    .subtitle {
      text-align: center;
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h2 .step-num {
      display: inline-flex;
      width: 24px; height: 24px;
      align-items: center; justify-content: center;
      border-radius: 50%;
      background: #30363d;
      font-size: 12px;
      font-weight: 600;
    }
    .card h2 .step-num.done {
      background: #238636;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #58a6ff;
    }
    .form-group textarea {
      min-height: 60px;
      resize: vertical;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .file-upload-wrapper {
      position: relative;
    }
    .file-upload-wrapper input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 2;
    }
    .file-upload-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px dashed #30363d;
      border-radius: 6px;
      font-size: 14px;
      color: #8b949e;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .file-upload-label:hover {
      border-color: #58a6ff;
    }
    .file-upload-label.has-file {
      border-color: #3fb950;
      color: #3fb950;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #238636;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: #2ea043; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #30363d;
      color: #c9d1d9;
    }
    .btn-secondary:hover { background: #3d444d; }
    .btn-warning {
      background: #da3633;
      color: #fff;
    }
    .btn-warning:hover { background: #f85149; }
    .wallet-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #wallet-status {
      font-size: 13px;
      color: #8b949e;
    }
    #wallet-status.connected {
      color: #3fb950;
    }
    #status {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      font-family: 'SFMono-Regular', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #status .log-error { color: #f85149; }
    #status .log-success { color: #3fb950; }
    #status .log-warning { color: #d29922; }

    .steps {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .step {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #30363d;
      transition: background 0.3s;
    }
    .step.active { background: #58a6ff; }
    .step.done { background: #238636; }

    #result {
      display: none;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
      margin-top: 16px;
    }
    #result h3 { color: #3fb950; margin-bottom: 12px; }
    #result table { width: 100%; margin-bottom: 12px; }
    #result table td { padding: 4px 8px; font-size: 13px; }
    #result table td:first-child { color: #8b949e; width: 80px; }
    #result table td:last-child { word-break: break-all; }
    #result .addr { font-family: monospace; color: #58a6ff; font-size: 12px; }
    #result a { color: #58a6ff; font-size: 13px; }
    #result pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 10px;
      font-size: 11px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .network-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .network-devnet { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
    .network-mainnet { background: #da363322; color: #f85149; border: 1px solid #da363344; }
    .footer {
      text-align: center;
      color: #484f58;
      font-size: 12px;
      padding: 24px 0;
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#9889; Solana Token Creator</h1>
    <p class="subtitle">浏览器发币工具 &middot; Token-2022 &middot; 元数据自动上传 &middot; 头像即刻显示</p>

    <!-- 钱包连接 -->
    <div class="card">
      <h2>&#128279; 连接钱包</h2>
      <div class="wallet-bar">
        <span id="wallet-status">未连接</span>
        <div>
          <select id="wallet-select" class="btn btn-secondary" style="margin-right:6px;padding:8px 6px;width:90px;">
            <option value="auto">&#129302; 自动</option>
            <option value="phantom">&#128123; Phantom</option>
            <option value="okx">&#128309; OKX</option>
          </select>
          <select id="network-select" class="btn btn-secondary" style="margin-right:6px;padding:8px 12px;">
            <option value="devnet">&#129514; Devnet</option>
            <option value="mainnet">&#128640; Mainnet</option>
          </select>
          <button id="connect-btn" class="btn btn-primary">连接钱包</button>
        </div>
      </div>
    </div>

    <!-- 代币参数 -->
    <div class="card">
      <h2><span class="step-num">1</span> 代币参数</h2>
      <div class="form-group">
        <label>代币名称</label>
        <input id="token-name" placeholder="例如: My Token" value="MyToken">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>符号</label>
          <input id="token-symbol" placeholder="例如: MYT" value="MYT">
        </div>
        <div class="form-group">
          <label>精度</label>
          <input id="token-decimals" type="number" value="9">
        </div>
        <div class="form-group">
          <label>总量</label>
          <input id="token-supply" type="number" value="10000000">
        </div>
      </div>
      <div class="form-group">
        <label>代币头像（可选，上传后将自动显示在钱包中）</label>
        <div class="file-upload-wrapper">
          <input id="token-image-file" type="file" accept="image/*">
          <div class="file-upload-label" id="file-label">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 1L8 11M8 1L11 4M8 1L5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 10V13C2 13.5523 2.44772 14 3 14H13C13.5523 14 14 13.5523 14 13V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="file-label-text">点击选择图片（PNG/JPG）</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="token-desc" placeholder="代币描述（可选）"></textarea>
      </div>
    </div>

    <!-- 创建 -->
    <div class="card">
      <h2><span class="step-num">2</span> &#128640; 创建代币</h2>
      <p style="font-size:13px;color:#8b949e;margin-bottom:12px;">
        钱包仅需签名1次，发完币头像自动显示
      </p>
      <button id="create-btn" class="btn btn-primary" disabled style="width:100%;justify-content:center;padding:14px;">
        &#10024; 创建代币
      </button>
    </div>

    <!-- 进度条 -->
    <div class="steps">
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>

    <!-- 状态日志 -->
    <div class="card">
      <h2>&#128203; 日志</h2>
      <div id="status">准备就绪，连接钱包开始</div>
    </div>

    <!-- 结果 -->
    <div id="result"></div>

    <div class="footer">
      Created by sshzui &middot; Powered by Solana Token-2022
    </div>
  </div>

  <!-- Buffer polyfill -->
  <script src="buffer-polyfill.js"></script>
  <script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.js"></script>
  <script src="bundle.js?v=4"></script>
</body>
</html>
